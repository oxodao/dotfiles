autogenerated = 0
# https://wiki.hypr.land/Configuring/

# Required:
# => RoR: https://github.com/lambdachad/raise

monitor=,preferred,auto,auto

$mainMod = SUPER

source = ~/.config/hypr/hyprland/startup.conf
source = ~/.config/hypr/hyprland/theme.conf
source = ~/.config/hypr/hyprland/layout.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/keybinds_layout.conf
source = ~/.config/hypr/hyprland/keybinds_software.conf
source = ~/.config/hypr/hyprland/windows.conf

# Importing a per-device config
# Stolen idea from https://www.reddit.com/r/hyprland/comments/1cl0dse/sourcehostname/
exec-once = echo "source = ~/.config/hypr/hyprland/host/$(hostnamectl hostname).conf" > ~/.config/hypr/hyprland/host_specific.conf
source = ~/.config/hypr/hyprland/host_specific.conf
